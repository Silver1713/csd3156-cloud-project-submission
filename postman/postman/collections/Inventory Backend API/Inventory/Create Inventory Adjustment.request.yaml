$kind: http-request
name: Create Inventory Adjustment
method: POST
url: '{{base_url}}/inventory/adjustments'
order: 5065
headers:
  Authorization: 'Bearer {{access_token}}'
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "productId": "{{product_id}}",
      "direction": "increase",
      "quantity": 3,
      "reason": "Cycle count reconciliation"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201, 400, 401, 403, 404, or 409", function () {
        pm.expect(pm.response.code).to.be.oneOf([201, 400, 401, 403, 404, 409]);
      });

      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

      pm.test("Response time is less than 500ms", function () {
        pm.expect(pm.response.responseTime).to.be.below(500);
      });
