$kind: http-request
name: List Products
method: GET
url: '{{base_url}}/products?limit=25&offset=0&q=widget&productCatagoryId={{category_id}}&hasInventory=true&minQuantity=1&minUnitCost=10&maxUnitCost=50&sortBy=unitCost&sortOrder=desc'
order: 1000
headers:
  Authorization: 'Bearer {{access_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200, 401, or 403", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 401, 403]);
      });

      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

      pm.test("Response time is less than 500ms", function () {
        pm.expect(pm.response.responseTime).to.be.below(500);
      });
