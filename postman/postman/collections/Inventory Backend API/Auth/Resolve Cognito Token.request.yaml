$kind: http-request
name: Resolve Cognito Token
method: POST
url: '{{base_url}}/auth/cognito/resolve'
order: 4000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "accessToken": "{{access_token}}",
      "idToken": "{{id_token}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200, 400, or 401", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 400, 401]);
      });

      pm.test("Response is JSON", function () {
        pm.response.to.be.json;
      });

      pm.test("Response time is less than 500ms", function () {
        pm.expect(pm.response.responseTime).to.be.below(500);
      });

      if (pm.response.code === 200) {
        const body = pm.response.json();
        const account = body.account;

        if (account?.orgId) {
          pm.environment.set("org_id", account.orgId);
        }

        if (account?.roleId) {
          pm.environment.set("role_id", account.roleId);
        }
      }
